# Pages d'erreur personnalisées pour tous les proxy hosts
error_page 401 /error401.html;
error_page 403 /error403.html;
error_page 404 /error404.html;
error_page 408 /error408.html;
error_page 429 /error429.html;
error_page 500 /error500.html;
error_page 502 /error502.html;
error_page 503 /error503.html;

# Intercepter les erreurs upstream (service down, etc.)
proxy_intercept_errors on;

# Bloquer l'accès direct aux pages d'erreur (internal = seulement via error_page)
location = /error401.html { root /var/www/html; internal; }
location = /error403.html { root /var/www/html; internal; }
location = /error404.html { root /var/www/html; internal; }
location = /error408.html { root /var/www/html; internal; }
location = /error429.html { root /var/www/html; internal; }
location = /error500.html { root /var/www/html; internal; }
location = /error502.html { root /var/www/html; internal; }
location = /error503.html { root /var/www/html; internal; }
